<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>/* ============================================================
   Objetivo — visión por imagen
   Paleta tinta-violeta + iris iridiscente (ámbar → rosa → lila)
   ============================================================ */

:root {
  --tinta:      #16121e;
  --panel:      #211a2e;
  --panel-alto: #2c2440;
  --linea:      #3a3152;
  --texto:      #ede9f2;
  --apagado:    #a79fb8;
  --tenue:      #6f6886;

  --ambar:      #ffc97a;
  --rosa:       #ff8fb1;
  --lila:       #9b8cff;
  --verde:      #6ee7a8;
  --rojo:       #ff7d8a;

  --iris: linear-gradient(135deg, var(--ambar) 0%, var(--rosa) 50%, var(--lila) 100%);

  --display: "Bricolage Grotesque", system-ui, sans-serif;
  --cuerpo:  "Inter", system-ui, sans-serif;
  --mono:    "JetBrains Mono", ui-monospace, monospace;

  --radio:    18px;
  --objetivo: 340px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

[hidden] { display: none !important; }

html { -webkit-text-size-adjust: 100%; }

body {
  min-height: 100vh;
  font-family: var(--cuerpo);
  color: var(--texto);
  background: var(--tinta);
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* --- Atmósfera de fondo ------------------------------------ */
.aura {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 50% 38%, rgba(155, 140, 255, 0.20), transparent 55%),
    radial-gradient(circle at 78% 78%, rgba(255, 143, 177, 0.14), transparent 50%),
    radial-gradient(circle at 18% 80%, rgba(255, 201, 122, 0.10), transparent 50%);
}

/* --- Barra superior ---------------------------------------- */
.barra {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 14px;
  flex-wrap: wrap;
  padding: 22px clamp(20px, 5vw, 48px);
}

.marca {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--display);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.02em;
}

.marca__punto {
  width: 13px;
  height: 13px;
  border-radius: 50%;
  background: var(--iris);
  box-shadow: 0 0 14px rgba(255, 143, 177, 0.7);
}

.barra__derecha {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* Selector de idioma */
.idiomas {
  display: inline-flex;
  padding: 3px;
  border: 1px solid var(--linea);
  border-radius: 999px;
  background: rgba(33, 26, 46, 0.6);
  backdrop-filter: blur(8px);
}

.idiomas__btn {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--apagado);
  background: transparent;
  border: none;
  border-radius: 999px;
  padding: 6px 13px;
  cursor: pointer;
  transition: color 0.2s ease, background 0.2s ease;
}

.idiomas__btn:hover { color: var(--texto); }

.idiomas__btn.is-activa {
  color: var(--tinta);
  background: var(--iris);
}

.idiomas__btn:focus-visible {
  outline: 2px solid var(--lila);
  outline-offset: 2px;
}

/* Estado */
.estado {
  display: flex;
  align-items: center;
  gap: 9px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--apagado);
  padding: 7px 14px;
  border: 1px solid var(--linea);
  border-radius: 999px;
  background: rgba(33, 26, 46, 0.6);
  backdrop-filter: blur(8px);
  transition: color 0.3s ease;
}

.estado__luz {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--lila);
  box-shadow: 0 0 8px var(--lila);
  animation: latido 2.4s ease-in-out infinite;
}

.estado.is-ok .estado__luz { background: var(--verde); box-shadow: 0 0 8px var(--verde); }
.estado.is-ok { color: #bdf0d2; }
.estado.is-error .estado__luz { background: var(--rojo); box-shadow: 0 0 8px var(--rojo); }
.estado.is-error { color: #ffc4c9; }

@keyframes latido {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.35; }
}

/* --- Escena central ---------------------------------------- */
.escena {
  position: relative;
  z-index: 1;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px clamp(20px, 5vw, 48px) 56px;
  gap: 18px;
}

.eyebrow {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--rosa);
}

.titular {
  font-family: var(--display);
  font-weight: 800;
  font-size: clamp(2.4rem, 7vw, 4.4rem);
  line-height: 0.98;
  letter-spacing: -0.035em;
  max-width: 16ch;
}

.entrada {
  max-width: 46ch;
  font-size: clamp(0.95rem, 2.4vw, 1.08rem);
  line-height: 1.55;
  color: var(--apagado);
}

/* --- SEÑA: el objetivo ------------------------------------- */
.objetivo {
  position: relative;
  width: var(--objetivo);
  height: var(--objetivo);
  max-width: 86vw;
  max-height: 86vw;
  margin: 14px 0 6px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  cursor: pointer;
  isolation: isolate;
  transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.objetivo:hover { transform: scale(1.015); }

.objetivo:focus-visible {
  outline: 2px solid var(--lila);
  outline-offset: 10px;
}

.objetivo__halo {
  position: absolute;
  inset: -8%;
  border-radius: 50%;
  background: var(--iris);
  filter: blur(38px);
  opacity: 0.32;
  z-index: -1;
  animation: respira 5.5s ease-in-out infinite;
}

@keyframes respira {
  0%, 100% { transform: scale(0.92); opacity: 0.26; }
  50%      { transform: scale(1.04); opacity: 0.42; }
}

.objetivo::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle at 50% 42%, var(--panel-alto), var(--panel) 70%);
  border: 1px solid var(--linea);
  box-shadow:
    inset 0 2px 30px rgba(0, 0, 0, 0.5),
    0 30px 60px rgba(0, 0, 0, 0.45);
}

.objetivo__anillo {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  animation: gira 26s linear infinite;
}

.objetivo__anillo circle {
  fill: none;
  stroke: rgba(237, 233, 242, 0.18);
  stroke-width: 1.5;
  stroke-dasharray: 2 12;
  stroke-linecap: round;
}

@keyframes gira { to { transform: rotate(360deg); } }

.iris {
  position: absolute;
  width: 74%;
  height: 74%;
  transition: opacity 0.45s ease, transform 0.45s ease;
}

.iris__hojas {
  transform-origin: 100px 100px;
  transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.iris__cuerpo {
  fill: url(#gradIris);
  fill-opacity: 0.92;
}

.iris__costuras line {
  stroke: rgba(22, 18, 30, 0.55);
  stroke-width: 1.4;
  stroke-linecap: round;
}

.objetivo__vista {
  position: absolute;
  width: 78%;
  height: 78%;
  border-radius: 50%;
  overflow: hidden;
  opacity: 0;
  transform: scale(0.85);
  transition: opacity 0.5s ease, transform 0.5s ease;
  pointer-events: none;
}

.objetivo__vista img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.objetivo__enfoque {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    100deg,
    transparent 30%,
    rgba(255, 255, 255, 0.5) 50%,
    transparent 70%
  );
  transform: translateX(-120%);
  opacity: 0;
}

/* Texto guía bajo el objetivo */
.guia {
  display: flex;
  flex-direction: column;
  gap: 4px;
  transition: opacity 0.35s ease;
}

.guia__principal {
  font-family: var(--display);
  font-weight: 700;
  font-size: 1.15rem;
  letter-spacing: -0.02em;
}

.guia__secundario {
  font-size: 0.85rem;
  color: var(--apagado);
}

/* Estado: arrastrando encima */
.objetivo.is-drag { transform: scale(1.04); }
.objetivo.is-drag .objetivo__halo { opacity: 0.6; animation-duration: 2.2s; }
.objetivo.is-drag .objetivo__anillo { animation-duration: 6s; }
.objetivo.is-drag .iris__hojas { transform: scale(1.14); }

/* Estado: con imagen */
.objetivo.has-imagen .iris { opacity: 0; transform: scale(1.25); }
.objetivo.has-imagen + .guia { opacity: 0; pointer-events: none; }
.objetivo.has-imagen .objetivo__vista { opacity: 1; transform: scale(1); }
.objetivo.has-imagen .objetivo__halo { opacity: 0.5; }

.objetivo.is-enfocando .objetivo__enfoque { animation: barrido 1.1s ease-in-out; }

@keyframes barrido {
  0%   { transform: translateX(-120%); opacity: 0; }
  20%  { opacity: 1; }
  80%  { opacity: 1; }
  100% { transform: translateX(120%); opacity: 0; }
}

/* --- Ficha del archivo ------------------------------------- */
.ficha {
  display: flex;
  align-items: center;
  gap: 22px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 14px 18px;
  border: 1px solid var(--linea);
  border-radius: var(--radio);
  background: rgba(33, 26, 46, 0.7);
  backdrop-filter: blur(10px);
  animation: surge 0.4s ease both;
}

@keyframes surge {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.ficha__info {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  text-align: left;
}

.ficha__nombre {
  font-weight: 600;
  font-size: 0.95rem;
  max-width: 32ch;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.ficha__peso {
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--apagado);
}

.ficha__acciones { display: flex; gap: 10px; }

/* --- Botones ----------------------------------------------- */
.boton {
  font-family: var(--cuerpo);
  font-weight: 600;
  font-size: 0.9rem;
  padding: 11px 20px;
  border-radius: 12px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: transform 0.18s ease, filter 0.18s ease,
    background 0.18s ease, border-color 0.18s ease;
}

.boton:active { transform: translateY(1px); }
.boton:disabled { opacity: 0.55; cursor: default; }

.boton--solido { color: var(--tinta); background: var(--iris); }
.boton--solido:hover:not(:disabled) { filter: brightness(1.08); }

.boton--fantasma {
  color: var(--texto);
  background: transparent;
  border-color: var(--linea);
}
.boton--fantasma:hover { border-color: var(--lila); background: rgba(155, 140, 255, 0.1); }

/* --- Metadatos --------------------------------------------- */
.metadatos {
  list-style: none;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px 26px;
  margin-top: 6px;
  font-size: 0.82rem;
  color: var(--apagado);
}

.metadatos__clave {
  font-family: var(--mono);
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--tenue);
  margin-right: 6px;
}

/* --- Notificación (toast) ---------------------------------- */
.toast {
  position: fixed;
  left: 50%;
  top: 84px;
  z-index: 50;
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 13px 18px 13px 15px;
  border: 1px solid var(--linea);
  border-radius: 14px;
  background: rgba(33, 26, 46, 0.92);
  backdrop-filter: blur(14px);
  box-shadow: 0 18px 40px rgba(0, 0, 0, 0.5);
  color: var(--texto);
  font-size: 0.92rem;
  font-weight: 500;
  transform: translate(-50%, -24px);
  opacity: 0;
  transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.35s ease;
}

.toast.is-visible { transform: translate(-50%, 0); opacity: 1; }

.toast__icono {
  display: grid;
  place-items: center;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  flex-shrink: 0;
  font-size: 14px;
  font-weight: 700;
  color: var(--tinta);
}

.toast.is-ok .toast__icono { background: var(--verde); }
.toast.is-error .toast__icono { background: var(--rojo); }

.toast__texto { display: flex; flex-direction: column; gap: 1px; }
.toast__sub { font-size: 0.76rem; font-weight: 400; color: var(--apagado); }

/* --- Responsive -------------------------------------------- */
@media (max-width: 520px) {
  :root { --objetivo: 280px; }
  .barra { padding: 18px 20px; }
  .ficha { width: 100%; }
  .ficha__acciones { width: 100%; }
  .ficha__acciones .boton { flex: 1; }
  .toast { left: 16px; right: 16px; top: 16px; transform: translateY(-24px); }
  .toast.is-visible { transform: translateY(0); }
}

/* --- Accesibilidad: movimiento reducido -------------------- */
@media (prefers-reduced-motion: reduce) {
  .objetivo__halo,
  .objetivo__anillo,
  .estado__luz { animation: none; }
  .objetivo.is-enfocando .objetivo__enfoque { animation: none; opacity: 0; }
  * { transition-duration: 0.01ms !important; }
}

/* --- Resultado del anonimizado ----------------------------- */
.resultado {
  width: 100%;
  max-width: 760px;
  display: flex;
  flex-direction: column;
  gap: 22px;
  margin-top: 10px;
  animation: surge 0.45s ease both;
}

.resultado__lienzo {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.resultado__panel {
  position: relative;
  border: 1px solid var(--linea);
  border-radius: var(--radio);
  overflow: hidden;
  background: var(--panel);
  box-shadow: 0 18px 40px rgba(0, 0, 0, 0.4);
}

.resultado__rotulo {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 2;
  font-family: var(--mono);
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--apagado);
  padding: 4px 10px;
  border-radius: 999px;
  background: rgba(22, 18, 30, 0.72);
  backdrop-filter: blur(6px);
}

.resultado__rotulo--ok {
  color: var(--tinta);
  background: var(--iris);
}

.resultado__img {
  display: block;
  width: 100%;
  height: auto;
  aspect-ratio: 1 / 1;
  object-fit: contain;
  background: #000;
}

/* Panel de texto detectado */
.resultado__datos {
  border: 1px solid var(--linea);
  border-radius: var(--radio);
  background: rgba(33, 26, 46, 0.7);
  backdrop-filter: blur(10px);
  padding: 16px 18px;
  text-align: left;
}

.resultado__cab {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}

.resultado__titulo {
  font-family: var(--display);
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: -0.01em;
}

.resultado__contador {
  font-family: var(--mono);
  font-size: 0.72rem;
  color: var(--tinta);
  background: var(--iris);
  padding: 3px 10px;
  border-radius: 999px;
  min-width: 26px;
  text-align: center;
}

.resultado__lista {
  list-style: none;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.resultado__lista li {
  font-family: var(--mono);
  font-size: 0.82rem;
  color: var(--texto);
  padding: 6px 12px;
  border: 1px solid var(--linea);
  border-radius: 10px;
  background: rgba(22, 18, 30, 0.5);
  word-break: break-word;
}

.resultado__lista li .puntuacion {
  color: var(--tenue);
  font-size: 0.7rem;
  margin-left: 7px;
}

.resultado__vacio {
  font-size: 0.88rem;
  color: var(--apagado);
}

.resultado__acciones {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

.resultado__acciones .boton { text-decoration: none; }

@media (max-width: 520px) {
  .resultado__lienzo { grid-template-columns: 1fr; }
  .resultado__acciones { width: 100%; }
  .resultado__acciones .boton { flex: 1; text-align: center; }
}
</style></head>
